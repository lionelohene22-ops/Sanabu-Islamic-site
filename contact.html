<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - Sanabu Islamic</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <nav class="navbar">
            <div class="container">
                <h1 class="logo">Sanabu Islamic</h1>
                <ul class="nav-links">
                    <li><a href="index.html">Home</a></li>
                    <li><a href="about.html">About</a></li>
                    <li><a href="contact.html">Contact</a></li>
                </ul>
            </div>
        </nav>
    </header>

    <main>
        <section class="content">
            <div class="container">
                <h2>Contact Us</h2>
                <p>We'd love to hear from you! Get in touch with us at:</p>
                <div class="contact-info">
                    <p>Email: info@sanabuislamic.com</p>
                    <p>Website: <a href="https://sanabuislamic.com">https://sanabuislamic.com</a></p>
                </div>
                <form class="contact-form">
                    <label for="name">Name:</label>
                    <input type="text" id="name" name="name" required>
                    
                    <label for="email">Email:</label>
                    <input type="email" id="email" name="email" required>
                    
                    <label for="message">Message:</label>
                    <textarea id="message" name="message" rows="5" required></textarea>
                    
                    <button type="submit">Send Message</button>
                </form>
            </div>
        </section>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2026 Sanabu Islamic. All rights reserved.</p>
            <p>Website: <a href="https://sanabuislamic.com">https://sanabuislamic.com</a></p>
        </div>
    </footer>
</body>
</html>
